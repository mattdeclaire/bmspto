
name: Deploy to Github Pages

on:
    push:
        branches: [ main ]
    workflow_dispatch:
    repository_dispatch:
        types: [publish-event]

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: withastro/action@v2
              with:
                  node-version: 24

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to Github Pages
              id: deployment
              uses: actions/deploy-pages@v4
